<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Biblioteca de mídia pessoal">
  <title>JellyWatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="top">
    <div id="brand">
      <span id="logo">◈</span>
      <span id="site-name">JellyWatch</span>
    </div>
    <div id="search-wrap">
      <input id="q" type="search" placeholder="buscar na biblioteca..." autocomplete="off" spellcheck="false">
      <span id="search-hint"></span>
    </div>
    <div id="stats"></div>
  </div>

  <main id="main">
    <div id="skeleton">
      <div class="sk-section"></div>
      <div class="sk-section"></div>
      <div class="sk-section"></div>
    </div>
  </main>

  <div id="updated"></div>

  <script src="app.js"></script>
</body>
</html>
